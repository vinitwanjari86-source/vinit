<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bhumi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:black;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* Background cinematic gradient */

.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center,#ff4b6e20,#000 70%);
animation:zoom 20s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

/* floating particles */

.particle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:0.6;
animation:float linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-100vh)}
}

/* Content */

.content{
text-align:center;
z-index:2;
animation:fade 2s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Title */

.title{
font-size:90px;
font-weight:800;
letter-spacing:5px;

background:linear-gradient(90deg,#fff,#ff6b81,#fff);

-webkit-background-clip:text;
background-clip:text;

-webkit-text-fill-color:transparent;
}
/* Romantic message */

.message{
margin-top:20px;
font-size:22px;
letter-spacing:2px;
opacity:0.8;
min-height:30px;
}

/* Button */

.btn{
margin-top:50px;
padding:14px 50px;
background:transparent;
border:1px solid rgba(255,255,255,0.4);
color:white;
letter-spacing:3px;
cursor:pointer;
transition:0.4s;
}

.btn:hover{
background:white;
color:black;
box-shadow:0 0 30px rgba(255,255,255,0.4);
transform:scale(1.05);
}

.fadeout{
animation:exit 1.3s forwards;
}

@keyframes exit{
to{
opacity:0;
transform:scale(0.9);
filter:blur(10px);
}
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="content" id="scene">

<div class="title">For Bhumi</div>

<div class="message" id="type"></div>

<button class="btn" onclick="go()">Start Our Story</button>

</div>

<script>

// particles

const bg=document.getElementById("bg");

for(let i=0;i<120;i++){

let p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(6+Math.random()*8)+"s";

bg.appendChild(p);

}

// typewriter romantic message

const text="Every moment with you feels like a beautiful dream...";
let i=0;

function typing(){

if(i<text.length){
document.getElementById("type").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,50);
}

}

typing();

// button transition

function go(){

document.getElementById("scene").classList.add("fadeout");

setTimeout(()=>{
window.location.href="v.html";
},1300);

}

</script>

</body>
</html>
